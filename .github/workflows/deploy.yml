name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify brick templates are in sync
        run: |
          dart run tools/sync_brick.dart
          if git diff --exit-code lib/src/wizard/generator/brick_templates.g.dart; then
            echo "brick_templates.g.dart is up-to-date"
          else
            echo "::error::brick_templates.g.dart is stale. Run: dart run tools/sync_brick.dart"
            exit 1
          fi

      - name: Build web
        run: flutter build web --release --base-href /Lark/

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: false

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
