<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Lark Web Application">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Lark</title>
  <link rel="manifest" href="manifest.json">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
    }

    /* -----------------------------------------------
       Splash screen overlay
       Sits on top of everything while Flutter loads
    ----------------------------------------------- */
    #flutter-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      /* Subtle dark-blue radial glow in the centre */
      background: radial-gradient(ellipse at 50% 40%, #1a1a2e 0%, #0f0f0f 70%);

      /* Used by the .fade-out class to smoothly dismiss */
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    /* Added by JS when Flutter is ready — triggers the exit animation */
    #flutter-splash.fade-out {
      opacity: 0;
      transform: scale(1.03);
      pointer-events: none;
    }

    /* -----------------------------------------------
       Logo
    ----------------------------------------------- */
    #flutter-splash .logo-wrap {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Soft purple glow ring that pulses behind the logo */
    #flutter-splash .logo-wrap::before {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(130, 100, 255, 0.35) 0%, transparent 70%);
      animation: glow-pulse 2.4s ease-in-out infinite;
    }

    #flutter-splash img {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      position: relative;

      /* Bounces in from a small scale on first load */
      animation: logo-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes logo-pop {
      from {
        opacity: 0;
        transform: scale(0.6);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes glow-pulse {
      0%, 100% {
        opacity: 0.6;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.18);
      }
    }

    /* -----------------------------------------------
       App name & tagline
    ----------------------------------------------- */
    #flutter-splash .app-name {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      animation: fade-up 0.5s 0.25s ease both;
    }

    #flutter-splash .tagline {
      margin-top: 6px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.08em;
      animation: fade-up 0.5s 0.4s ease both;
    }

    /* Both the name and tagline slide up from below when they appear */
    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* -----------------------------------------------
       Loading dots
    ----------------------------------------------- */
    #flutter-splash .dots {
      display: flex;
      gap: 8px;
      margin-top: 40px;
      animation: fade-up 0.5s 0.55s ease both;
    }

    #flutter-splash .dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: dot-bounce 1.2s ease-in-out infinite;
    }

    /* First dot gets the purple accent; the rest are staggered */
    #flutter-splash .dots span:nth-child(1) {
      background: rgba(130, 100, 255, 0.8);
      animation-delay: 0s;
    }

    #flutter-splash .dots span:nth-child(2) {
      animation-delay: 0.18s;
    }

    #flutter-splash .dots span:nth-child(3) {
      animation-delay: 0.36s;
    }

    @keyframes dot-bounce {
      0%, 80%, 100% {
        transform: translateY(0);
        opacity: 0.5;
      }
      40% {
        transform: translateY(-8px);
        opacity: 1;
      }
    }
  </style>
</head>
<body>

<div id="flutter-splash">
  <div class="logo-wrap">
    <img src="icons/Icon-512.png" alt="Lark" />
  </div>

  <span class="app-name">Lark</span>
  <span class="tagline">Flutter Wizard</span>

  <div class="dots">
    <span></span>
    <span></span>
    <span></span>
  </div>
</div>

<script src="flutter_bootstrap.js" async></script>
</body>
</html>
